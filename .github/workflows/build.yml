name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Create spec file
      run: |
        echo "
a = Analysis(['launcher.py'],
             pathex=['.'],
             binaries=[],
             datas=[('templates', 'templates'), ('assets', 'assets'), ('data', 'data')],
             hiddenimports=['flask', 'flask_cors', 'markupsafe', 'jinja2', 'itsdangerous', 'werkzeug'],
             hookspath=[],
             runtime_hooks=[],
             excludes=['tkinter', 'numpy', 'scipy', 'pandas', 'matplotlib'],
             win_no_prefer_redirects=False,
             win_private_assemblies=False,
             cipher=None,
             noarchive=False)
pyz = PYZ(a.pure, a.zipped_data,
             cipher=None)
exe = EXE(pyz,
          a.scripts,
          a.binaries,
          a.zipfiles,
          a.datas,
          [],
          name='SuperSu',
          debug=False,
          bootloader_ignore_signals=False,
          strip=False,
          upx=True,
          upx_exclude=[],
          runtime_tmpdir=None,
          console=False,
          disable_windowed_traceback=False,
          target_arch=None,
          codesign_identity=None,
          entitlements_file=None )
" | Out-File -FilePath SuperSu.spec -Encoding UTF8
    
    - name: Build with PyInstaller
      run: pyinstaller SuperSu.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SuperSu-Windows
        path: dist/SuperSu.exe